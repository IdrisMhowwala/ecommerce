{% extends "base.html" %}
{% block title %}Create Account – FlaskShop{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <i class="bi bi-person-plus-fill fs-1 text-primary"></i>
            <h2 class="fw-bold mt-2">Create Account</h2>
            <p class="text-muted">Join FlaskShop today</p>
          </div>

          {% if errors %}
          <div class="alert alert-danger">
            <ul class="mb-0 ps-3">
              {% for e in errors %}<li>{{ e }}</li>{% endfor %}
            </ul>
          </div>
          {% endif %}

          <form method="POST" novalidate>
            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="name" class="form-control"
                       placeholder="Jane Smith"
                       value="{{ form.get('name', '') }}" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email Address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" class="form-control"
                       placeholder="you@example.com"
                       value="{{ form.get('email', '') }}" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control"
                       placeholder="Min. 8 characters" required>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Confirm Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" name="confirm" class="form-control"
                       placeholder="Repeat password" required>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
              <i class="bi bi-person-check me-1"></i> Create Account
            </button>
          </form>

          <hr class="my-4">
          <p class="text-center mb-0 text-muted">
            Already have an account?
            <a href="{{ url_for('auth.login') }}" class="fw-semibold">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
