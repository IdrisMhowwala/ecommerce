databases:
  - name: flaskshop-db
    databaseName: flaskshop
    user: flaskshop
    plan: free

services:
  - type: web
    name: flaskshop
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn 'app:create_app()' --workers 4 --bind 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: flaskshop-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
