databases:
  - name: flaskshop-db
    databaseName: flaskshop
    user: flaskshop
    plan: free

services:
  - type: web
    name: flaskshop
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn wsgi:app --workers 4 --bind 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: FLASK_APP
        value: wsgi.py
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: flaskshop-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
